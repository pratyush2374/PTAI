<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTAI - Login</title>
    <link rel="stylesheet" href="Signup.css">
    <link rel="shortcut icon" href="/Images/Icon.svg" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="/Images/Login.png" alt="Login">
        </div>
        <div class="form-section">
            <h2>Login</h2>
            <form>                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your Email here">
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your Password here" class="password">
                
                <button type="submit">Create Account</button>
            </form>
            <p>Don't have an account? <a href="#">Sign Up</a></p>
            <div class="social-login">
                <p>— OR —</p>
                <div class="google"> <img src="/Images/Google Icon.svg" alt="G icon" width="30px">Sign in with Google</div>
            </div>
        </div>
    </div>
</body>
</html>
